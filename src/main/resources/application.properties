# Configuración de la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/sergiocalderon_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tucontraseña
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Configuración para JSPs (para mantener compatibilidad)
spring.mvc.view.prefix=/vistas/
spring.mvc.view.suffix=.jsp

# Para que Spring sepa dónde están los JSPs
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:src/main/webapp/

# Deshabilitar la caché para desarrollo
spring.mvc.view.cache=false

# Puerto del servidor
server.port=8080

# Logging para ver qué está pasando
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.view=DEBUG

#
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=AGENDAMIENTO_SESSION
server.servlet.session.tracking-modes=cookie